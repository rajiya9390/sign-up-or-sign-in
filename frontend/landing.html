<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 50px;
        }

        .logo {
            color: var(--primary-red);
            font-size: 32px;
            font-weight: 700;
        }

        .logout-btn {
            background: var(--primary-red);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }

        .welcome-card {
            background: var(--input-bg);
            padding: 40px;
            border-radius: 8px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .user-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">NETFLIX</div>
        <button id="logout-btn" class="logout-btn" onclick="logout()">Sign Out</button>
    </div>

    <div class="welcome-card">
        <h1>Welcome to Your Landing Page</h1>
        <p id="welcome-text" style="font-size: 20px; color: var(--text-color); margin-top: 10px;"></p>

        <div id="protected-data" class="user-info">
            <h3 style="color: var(--primary-red); margin-bottom: 10px;">Protected Content</h3>
            <p id="data-content">Loading protected data from backend...</p>
        </div>

        <p style="margin-top: 30px; color: var(--muted-text);">This page is protected by JWT middleware. Only
            authenticated users can see this content.</p>
    </div>

    <script>
        // Check for token on page load
        const token = localStorage.getItem('token');
        const welcomeText = document.getElementById('welcome-text');
        const dataContent = document.getElementById('data-content');

        if (!token) {
            // If no token exists, redirect to login page immediately
            console.log('No token found, redirecting to login...');
            window.location.href = 'index.html';
        } else {
            // If token exists, fetch protected data
            const user = JSON.parse(localStorage.getItem('user'));
            welcomeText.textContent = `Hello, ${user ? user.full_name : 'Valued Member'}!`;

            fetchProtectedData();
        }

        async function fetchProtectedData() {
            try {
                const response = await fetch('http://localhost:5000/landing', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    dataContent.textContent = data.message;
                } else if (response.status === 403 || response.status === 401) {
                    // Token is invalid or expired, redirect to login
                    console.log('Token invalid or expired, redirecting...');
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                } else {
                    dataContent.textContent = "Error loading protected data.";
                }
            } catch (err) {
                console.error('Fetch error:', err);
                dataContent.textContent = "Could not connect to the server.";
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>

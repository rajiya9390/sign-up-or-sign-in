<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 50px;
        }

        .logo {
            color: var(--primary-red);
            font-size: 32px;
            font-weight: 700;
        }

        .logout-btn {
            background: var(--primary-red);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }

        .welcome-card {
            background: var(--input-bg);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">NETFLIX</div>
        <button id="logout-btn" class="logout-btn">Sign Out</button>
    </div>

    <div class="welcome-card">
        <h1>Welcome Back!</h1>
        <p id="welcome-text" style="font-size: 18px; color: var(--muted-text);"></p>
        <p style="margin-top: 20px;">You have successfully logged into your account.</p>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        const welcomeText = document.getElementById('welcome-text');
        const logoutBtn = document.getElementById('logout-btn');

        if (!token) {
            window.location.href = 'index.html';
        } else {
            welcomeText.textContent = `Hello, ${user ? user.full_name : 'User'} (${user ? user.username : ''})`;

            // Verify token with backend
            fetch('http://localhost:5000/dashboard', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(res => {
                    if (!res.ok) {
                        localStorage.removeItem('token');
                        window.location.href = 'index.html';
                    }
                })
                .catch(err => console.error(err));
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>

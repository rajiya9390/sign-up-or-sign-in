<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <h1>Sign Up</h1>
        <div id="error-msg" class="error-message"></div>
        <div id="success-msg" class="success-message"></div>
        <form id="register-form">
            <div class="form-group">
                <input type="text" id="full_name" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="text" id="mobile" placeholder="Mobile Number">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirm_password" placeholder="Confirm Password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div class="signup-link">
            Already have an account? <a href="index.html">Sign in now.</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const full_name = document.getElementById('full_name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const mobile_number = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            // Password matching validation
            if (password !== confirm_password) {
                errorMsg.textContent = "Passwords do not match.";
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, username, email, mobile_number, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = data.message;
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                }
            } catch (err) {
                errorMsg.textContent = "Something went wrong. Please try again.";
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
